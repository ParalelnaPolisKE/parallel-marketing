text: |
  Ako rozmýšľať o slobode? Aké cesty k nej existujú? Dá sa sloboda naučiť?

  Vlastimil Švec v podcaste "Reči o živote, vesmíre a vôbec" s Jurajom Bednárom a Pavlom Luptákom rozoberá slobodu z pohľadu ekonómie, filozofie aj každodenného života.

  Ak ťa téma zaujala, príď na jeho prednášku "Slobodný trh" — kde vysvetlí, prečo slobodný trh nie je len o výmene tovaru, ale zasahuje do celého nášho života.

  📅 14. apríla 2026 o 18:00 (CEST)
  📍 Paralelná Polis Košice, Hlavná 36
  🎟️ Vstupné 7,77 € — lístky: https://events.ppke.sk/slobodny-trh

  🎧 Podcast: https://skpodcasty.sk/podcasty/reci-o-zivote-vesmire-a-vobec/epizoda/cesty-k-slobode-s-vlastimilom-svecom-a-pavlom-luptakom/

