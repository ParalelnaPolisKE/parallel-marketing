title: Paralelná Polis Košice je na Nostr
text: |
  Ahoj Nostr! 👋

  Sme Paralelná Polis Košice — hackerspace a komunitný priestor v centre Košíc, kde sa stretávajú ľudia okolo Bitcoinu, open-source technológií a decentralizácie.

  Organizujeme pravidelné meetupy, workshopy a prednášky. Vstup je vždy zadarmo, platíme v Bitcoin a Monero.

  Toto je náš prvý post na Nostr — ideálna platforma pre komunitu, ktorá verí v slobodnú komunikáciu bez prostredníkov.

  Sledujte nás pre info o eventoch a novinkách z PPKE.

  🔗 paralelnapolis.sk
  📍 Hlavná 36, Košice
