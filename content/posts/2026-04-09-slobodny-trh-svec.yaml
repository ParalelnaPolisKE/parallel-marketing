  Slobodný trh — prednáška Vlastimila Šveca

  📅 14. apríla 2026 o 18:00 (CEST)
  📍 Paralelná Polis Košice, Hlavná 36

  Občas sa stretnem so správou, že v Európskej únii je zóna voľného obchodu. Väčšina ľudí z toho mylne usudzuje, že sa nachádzame v slobodnom trhu...

  Na prednáške sa dozvieš:
  — Pravidlá a zásady teórie slobodného trhu
  — Prečo trh nie je len o výmene tovaru, ale zasahuje aj do súkromných životov
  — Ako boli pojmy „sloboda" a „trh" predefinované za účelom, ktorý je treba odhaliť
  — Ako by bezštátna spoločnosť poskytovala služby, o ktorých si myslíme, že ich vie poskytnúť iba štát

