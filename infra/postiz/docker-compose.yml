services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: unless-stopped
    env_file: postiz.env
    ports:
      - "0.0.0.0:4007:5000"
    volumes:
      - postiz-uploads:/uploads
      # Nostr provider patch: hex/nsec key conversion + memory cleanup
      - ./patches/nostr.provider.js:/app/apps/backend/dist/libraries/nestjs-libraries/src/integrations/social/nostr.provider.js:ro
      - ./patches/nostr.provider.js:/app/apps/orchestrator/dist/libraries/nestjs-libraries/src/integrations/social/nostr.provider.js:ro
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - postiz-network

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postiz
    volumes:
      - postiz-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - postiz-network

  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  # --- Temporal stack (workflow engine) ---
  temporal-elasticsearch:
    image: elasticsearch:8.16.1
    container_name: temporal-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - temporal-es-data:/usr/share/elasticsearch/data
    networks:
      - postiz-network

  temporal-postgresql:
    image: postgres:17-alpine
    container_name: temporal-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_DB: temporal
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - postiz-network

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: temporal
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=temporal-postgresql
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_started
    networks:
      - postiz-network

  # --- Postiz Agent auth server (device flow OAuth2) ---
  postiz-agent-server:
    build: ./postiz-agent-server
    container_name: postiz-agent-server
    restart: unless-stopped
    environment:
      PORT: "3111"
      SERVER_URL: https://postiz-agent.local.ppke.sk
      POSTIZ_FRONTEND_URL: https://postiz.local.ppke.sk
      POSTIZ_API_URL: https://postiz.local.ppke.sk/api
      POSTIZ_OAUTH_CLIENT_ID: ${POSTIZ_AGENT_OAUTH_CLIENT_ID}
      POSTIZ_OAUTH_CLIENT_SECRET: ${POSTIZ_AGENT_OAUTH_CLIENT_SECRET}
      DATABASE_URL: postgresql://postiz:${POSTGRES_PASSWORD}@postiz-postgres:5432/postiz
    ports:
      - "0.0.0.0:3111:3111"
    depends_on:
      postiz-postgres:
        condition: service_healthy
    networks:
      - postiz-network

  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - temporal
    networks:
      - postiz-network

volumes:
  postiz-uploads:
  postiz-pg-data:
  postiz-redis-data:
  temporal-es-data:
  temporal-pg-data:

networks:
  postiz-network:
    driver: bridge
