name: Create Newsletter Draft

on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Path to newsletter YAML (e.g. content/newsletters/2026-03-30-newsletter.yaml)'
        required: true
  pull_request:
    branches: [main]
    paths:
      - 'content/newsletters/**'

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Find newsletter files
        id: files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "files=${{ inputs.file }}" >> $GITHUB_OUTPUT
          else
            FILES=$(git diff --name-only origin/main...HEAD -- 'content/newsletters/**/*.yaml' | tr '\n' ' ')
            echo "files=$FILES" >> $GITHUB_OUTPUT
          fi

      - name: Create or update Mailchimp draft
        if: steps.files.outputs.files != ''
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
          MAILCHIMP_SERVER_PREFIX: ${{ secrets.MAILCHIMP_SERVER_PREFIX }}
        run: |
          for f in ${{ steps.files.outputs.files }}; do
            echo "Creating/updating draft for: $f"
            node scripts/create-newsletter-draft.mjs "$f"
          done

      - name: Commit campaign ID mapping
        if: steps.files.outputs.files != '' && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/newsletters/.campaigns.json || true
          if git diff --cached --quiet; then
            echo "No campaign mapping changes to commit."
          else
            git commit -m "chore: update campaign ID mapping

          Co-Authored-By: Paperclip <noreply@paperclip.ing>"
            git push origin HEAD:${{ github.head_ref }}
          fi
