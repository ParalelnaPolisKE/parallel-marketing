name: Validate Content

on:
  pull_request:
    branches: [main]
    paths:
      - 'content/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Validate content files
        run: node scripts/validate.mjs
