name: Delete Nostr Event

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: 'Nostr event ID to delete (hex)'
        required: true
      reason:
        description: 'Deletion reason'
        required: false
        default: 'duplicate post'

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Delete Nostr event
        env:
          NOSTR_PRIVATE_KEY: ${{ secrets.NOSTR_PRIVATE_KEY }}
          NOSTR_RELAYS: ${{ secrets.NOSTR_RELAYS }}
        run: node scripts/delete-nostr-event.mjs "${{ inputs.event_id }}" "${{ inputs.reason }}"
